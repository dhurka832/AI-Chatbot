<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Chatbot</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f2f2f2;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px;
        }

        h1 {
            color: #333;
        }

        #chatbox {
            width: 100%;
            max-width: 600px;
            height: 400px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            overflow-y: auto;
            padding: 20px;
            margin-bottom: 20px;
        }

        .message {
            margin: 10px 0;
            padding: 10px 15px;
            border-radius: 8px;
            max-width: 80%;
        }

        .user {
            background: #d1e7dd;
            align-self: flex-end;
            text-align: right;
            margin-left: auto;
        }

        .bot {
            background: #e2e3e5;
            align-self: flex-start;
            text-align: left;
            margin-right: auto;
        }

        .error {
            background: #f8d7da;
            color: #842029;
        }

        #userInput {
            width: 75%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        button {
            padding: 10px 15px;
            font-size: 16px;
            background-color: #0d6efd;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0b5ed7;
        }

        .input-container {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 600px;
        }
    </style>
</head>
<body>

<h1>AI Chatbot</h1>

<div id="chatbox"></div>

<div class="input-container">
    <input type="text" id="userInput" placeholder="Type a message..." autofocus>
    <button onclick="sendMessage()">Send</button>
</div>

<!-- JS goes here (same script from fix #1 above) -->
<script>
    async function sendMessage() {
        const inputField = document.getElementById("userInput");
        const chatbox = document.getElementById("chatbox");
        const userMessage = inputField.value.trim();

        if (!userMessage) return;

        chatbox.innerHTML += `<div class="message user"><b>You:</b> ${userMessage}</div>`;
        inputField.value = "";

        try {
            const response = await fetch("/api/chat/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify({ message: userMessage })
            });

            const data = await response.json();

            if (response.ok && data.reply) {
                chatbox.innerHTML += `<div class="message bot"><b>Bot:</b> ${data.reply}</div>`;
            } else {
                // Convert error object to readable message
                let errorText = "Unknown error occurred.";
                if (typeof data.error === 'string') {
                    errorText = data.error;
                } else if (typeof data.error === 'object') {
                    errorText = JSON.stringify(data.error);
                }

                chatbox.innerHTML += `<div class="message bot error"><b>Error:</b> ${errorText}</div>`;
            }

        } catch (err) {
            chatbox.innerHTML += `<div class="message bot error"><b>Error:</b> ${err.message}</div>`;
        }

        chatbox.scrollTop = chatbox.scrollHeight;
    }

    document.getElementById("userInput").addEventListener("keydown", function (event) {
        if (event.key === "Enter") {
            sendMessage();
        }
    });
</script>



</body>
</html>
